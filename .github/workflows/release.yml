name: Release

# Pushing a v* tag tests, builds, and publishes a GitHub Release with the zipped exe.
# The version is derived from the tag by MinVer at build time — nothing to edit in the repo.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer needs tags + history to compute the version

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test src/StandingsOverlay.Tests -c Release

      - name: Publish (self-contained single exe, no .NET install needed)
        run: >
          dotnet publish src/StandingsOverlay -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=embedded
          -o publish

      - name: Zip
        run: Compress-Archive -Path publish/* -DestinationPath "StandingsOverlay-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "StandingsOverlay-${{ github.ref_name }}-win-x64.zip"
          --generate-notes --verify-tag
